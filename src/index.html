<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>HealthTrack</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container" id="authContainer">
        <div class="content first-content">
            <div class="first-column">
                <h2 class="title title-primary">Bem-vindo de volta!</h2>
                <!-- <p class="description description-primary">Para manter-se conectado conosco</p> -->
                <p class="description description-primary">Por favor, faça login com suas informações pessoais!</p>
                <button id="signin" class="btn btn-primary">Entrar</button>
            </div>    
            <div class="second-column">
                <h2 class="title title-second">Criar Conta</h2>
                <form class="form" id="signupForm">
                    <label class="label-input" for="username">
                        <!-- <i class="far fa-user icon-modify"></i> -->
                        <input type="text" id="username" placeholder="Nome">
                    </label>
                    
                    <label class="label-input" for="email">
                        <!-- <i class="far fa-envelope icon-modify"></i> -->
                        <input type="email" id="email" placeholder="Email">
                    </label>
                    
                    <label class="label-input" for="password">
                        <!-- <i class="fas fa-lock icon-modify"></i> -->
                        <input type="password" id="password" placeholder="Senha">
                    </label>
                    
                    <button class="btn btn-second" id="signupButton" disabled>Cadastrar</button>        
                </form>
                
                <div class="success-message" id="successMessage" style="display: none;">
                    <h2 class="title title-second">Cadastro feito com sucesso!</h2>
                    <button id="goToLogin" class="btn btn-second">Ir para Login</button>
                </div>
            </div>
        </div>

        <div class="content second-content">
            <div class="first-column">
                <h2 class="title title-primary">Olá, amigo!</h2>
                <p class="description description-primary">Insira seus dados pessoais</p>
                <!-- <p class="description description-primary">e comece a jornada conosco</p> -->
                <button id="signup" class="btn btn-primary">Cadastrar</button>
            </div>
            <div class="second-column">
                <h2 class="title title-second">Entrar</h2>
                <form class="form" id="loginForm">
                    <label class="label-input" for="loginEmail">
                        <i class="far fa-envelope icon-modify"></i>
                        <input type="email" id="loginEmail" placeholder="Email" required>
                    </label>
                
                    <label class="label-input" for="loginPassword">
                        <i class="fas fa-lock icon-modify"></i>
                        <input type="password" id="loginPassword" placeholder="Senha" required>
                    </label>
                    <button class="btn btn-second" id="loginButton" type="button">Entrar</button>
                </form>
            </div>
        </div>
    </div>

    <div class="task-container" id="taskContainer" style="display: none;">
        <h1 class="task-title">Minhas Tarefas</h1>
        
        <div class="task-content">
            <div class="task-list" id="taskList">
            </div>
    
            <div class="task-form">
                <h2 class="task-form-title">Adicionar Tarefas</h2>
                <form>
                    <label for="taskTitle">Digite sua tarefa</label>
                    <input type="text" id="taskTitle" class="task-input" placeholder="Digite sua tarefa">
    
                    <label for="taskResponsible">Responsável pela tarefa</label>
                    <input type="text" id="taskResponsible" class="task-input" placeholder="Digite o responsável">
    
                    <label for="taskPriority">Grau de Prioridade (1 a 5)</label>
                    <input type="number" id="taskPriority" class="task-input" min="1" max="5" placeholder="1">
    
                    <label for="taskDate">Data de Entrega</label>
                    <input type="date" id="taskDate" class="task-input">
    
                    <button type="button" id="addTaskButton" class="task-btn task-btn-final-add-task">Adicionar Tarefa</button>
                </form>
                
                <button type="button" id="logoutButton" class="task-btn task-btn-logout">Sair para Tela de Login</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
